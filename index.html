<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>For My Love ❤️</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #ffdde1, #ee9ca7);
      display: flex; justify-content: center; align-items: center;
      direction: rtl;
    }

    .container {
      position: relative;
      width: 100%;
      max-width: 420px;
      text-align: center;
      padding: 20px 18px;
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.12);
    }

    .heart-wrapper {
      position: relative;
      width: 200px; height: 200px;
      margin: 0 auto 30px;
    }

    .heart {
      width: 180px; height: 180px;
      background: linear-gradient(135deg, #ff1e56, #ff4b7d);
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%) rotate(-45deg);
      border-radius: 16px;
      box-shadow: 0 0 40px rgba(255,30,86,0.45);
      animation: beat 1.25s infinite;
    }

    .heart::before, .heart::after {
      content: "";
      position: absolute;
      width: 180px; height: 180px;
      background: linear-gradient(135deg, #ff1e56, #ff4b7d);
      border-radius: 50%;
    }
    .heart::before { top: -90px; left: 0; }
    .heart::after { top: 0; left: 90px; }

    @keyframes beat {
      0%, 100% { transform: translate(-50%, -50%) rotate(-45deg) scale(1); }
      50% { transform: translate(-50%, -50%) rotate(-45deg) scale(1.08); }
    }

    .name {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-size: 28px;
      font-weight: bold;
      text-shadow: 0 0 10px rgba(0,0,0,0.2), 0 0 18px rgba(255,255,255,0.5);
    }

    .message {
      font-size: 26px;
      color: #fff;
      font-weight: bold;
      margin-top: 15px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.15);
    }

    .date {
      margin-top: 12px;
      font-size: 17px;
      color: #fff;
      text-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }

    .love-btn {
      margin-top: 24px;
      padding: 14px 26px;
      border: none;
      border-radius: 999px;
      background: #ff2d55;
      color: white;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(255, 45, 85, 0.22);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      max-width: 100%;
    }

    .love-btn:active {
      transform: scale(0.97);
    }

    #secretMessage, #delayedMessage {
      margin-top: 18px;
      font-size: 20px;
      font-weight: bold;
      color: #fff;
      text-shadow: 0 2px 10px rgba(0,0,0,0.15);
      line-height: 1.5;
      min-height: 32px;
    }

    @media (max-width: 480px) {
      .heart-wrapper { width: 160px; height: 160px; }
      .heart { width: 145px; height: 145px; }
      .heart::before, .heart::after { width: 145px; height: 145px; }
      .heart::before { top: -72.5px; }
      .heart::after { left: 72.5px; }
      .name { font-size: 24px; }
      .message { font-size: 22px; }
      .date { font-size: 16px; }
      #secretMessage, #delayedMessage { font-size: 18px; }
      .love-btn { font-size: 17px; padding: 12px 22px; }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="heart-wrapper">
      <div class="heart"></div>
      <div class="name">masa</div>
    </div>

    <div class="message">lovvvvvvvveee u forever habibtiii ❤️</div>
    <p class="date">since 2025/10/13 the best in my life and forever ❤️</p>

    <button class="love-btn" onclick="showLove()">press here habibtiiiii ❤️</button>

    <p id="secretMessage"></p>
    <p id="delayedMessage"></p>
  </div>

  <script>
    function showLove() {
      document.getElementById("secretMessage").innerHTML = 
        "u are my loveee and my wife and the most expensive thing i have in my life bmooooooottt fekeeee b7bkkkkkk ❤️";
    }
    setTimeout(() => {
      document.getElementById("delayedMessage").innerHTML = 
        "in arabic: بحبببببككككك و بموت فيكيييي يا روح قلبي و مرتي و حبيبتي و زينة حياتي و اميرة روحيي انتي ❤️";
    }, 4000);
  </script>

</body>
</html>
