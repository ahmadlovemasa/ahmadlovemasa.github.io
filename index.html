<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Our Journey ♥</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #fcfaf8; color: #3d3530; font-family: 'Cairo', sans-serif; margin: 0; padding: 0; }
        
        /* قسم الترحيب */
        #welcome-section { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .heart-logo { font-size: 5rem; color: #b5a59a; margin-bottom: 20px; }
        .btn-start { background: #8a7a72; color: white; padding: 15px 40px; border-radius: 50px; cursor: pointer; border: none; font-size: 1.2rem; transition: 0.3s; margin-top: 30px; }
        .btn-start:hover { transform: scale(1.05); }

        /* قسم القصة (مخفي مبدئياً) */
        #story-section { display: none; padding: 60px 20px; max-width: 500px; margin: auto; }
        .timeline-item { border-right: 1px solid #dcd4cf; padding-right: 25px; margin-bottom: 50px; position: relative; }
    </style>
</head>
<body>

<!-- واجهة الترحيب -->
<section id="welcome-section">
    <div class="heart-logo">A ♥ M</div>
    <h1>masa</h1>
    <p>lovvvvvvvveee u forever ♥ habibtiii</p>
    <button class="btn-start" onclick="showStory()">Start Our Adventure</button>
</section>

<!-- واجهة القصة -->
<section id="story-section">
    <h2 style="text-align: center;">قصتنا</h2>
    <div class="timeline-item">
        <div class="date" style="color:#b5a59a">13/10/2025</div>
        <div class="title" style="font-weight:600">بداية الحكاية</div>
        <p>بدأت من هنا أجمل صدفة في حياتي.</p>
    </div>
    <div class="timeline-item">
        <div class="date" style="color:#b5a59a">30/11/2025</div>
        <div class="title" style="font-weight:600">لقاء الروح</div>
        <p>أول لقاء بعد ست سنوات.. لم أستطع إخراج صورتك من عقلي.</p>
    </div>
    <!-- أضف باقي التواريخ بنفس طريقة الـ timeline-item أعلاه -->
</section>

<script>
    function showStory() {
        document.getElementById('welcome-section').style.display = 'none';
        document.getElementById('story-section').style.display = 'block';
        window.scrollTo(0, 0);
    }
</script>
</body>
</html>
