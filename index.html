<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Our Journey | Masa</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f5f0eb; --card: rgba(255, 255, 255, 0.7); --text: #3d3530; }
        body { 
            background: radial-gradient(circle at top right, #e8dcd3, #f5f0eb);
            color: var(--text); font-family: 'Cairo', sans-serif;
            margin: 0; padding: 40px 20px; min-height: 100vh;
        }
        .container { max-width: 500px; margin: auto; }
        .hero { text-align: center; margin-bottom: 80px; animation: fadeIn 2s; }
        h1 { font-size: 3rem; font-weight: 200; letter-spacing: 5px; margin: 0; }
        
        .card {
            background: var(--card); backdrop-filter: blur(15px);
            padding: 30px; border-radius: 25px; margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            transition: transform 0.3s ease; border: 1px solid rgba(255,255,255,0.5);
        }
        .card:hover { transform: translateY(-10px); }
        .date { font-size: 0.8rem; font-weight: 700; color: #a69890; margin-bottom: 10px; }
        .title { font-size: 1.3rem; font-weight: 700; margin-bottom: 5px; }
        .desc { font-size: 0.95rem; line-height: 1.6; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <div class="hero">
        <h1>masa</h1>
        <p>حكايتنا التي لا تنتهي ♥</p>
    </div>

    <!-- البطاقات -->
    <div class="card">
        <div class="date">13/10/2025</div>
        <div class="title">بداية الحكاية</div>
        <div class="desc">من هنا بدأت أجمل صدفة في حياتي.</div>
    </div>
    
    <div class="card">
        <div class="date">30/11/2025</div>
        <div class="title">لقاء الروح</div>
        <div class="desc">أول لقاء بعد ست سنوات.. لم أستطع إخراج صورتك من عقلي.</div>
    </div>

    <div class="card">
        <div class="date">04/12/2025</div>
        <div class="title">لحظة الإعتراف</div>
        <div class="desc">تحررت الكلمات من قلبي.. قلت لكِ أحبك بصدق.</div>
    </div>

    <!-- يمكنك إضافة باقي البطاقات بنفس التنسيق -->
</div>

</body>
</html>
