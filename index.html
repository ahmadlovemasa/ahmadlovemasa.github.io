<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For My Love ❤️</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #ffdde1, #ee9ca7);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
      overflow: hidden;
      direction: rtl;
    }

    .container {
      text-align: center;
      position: relative;
    }

    .heart {
      position: relative;
      width: 220px;
      height: 220px;
      background: red;
      transform: rotate(-45deg);
      margin: 0 auto;
      animation: beat 1s infinite;
      box-shadow: 0 0 40px rgba(255, 0, 80, 0.5);
    }

    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      width: 220px;
      height: 220px;
      background: red;
      border-radius: 50%;
    }

    .heart::before {
      top: -110px;
      left: 0;
    }

    .heart::after {
      left: 110px;
      top: 0;
    }

    .name {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(45deg);
      color: white;
      font-size: 28px;
      font-weight: bold;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
      width: 200px;
      text-align: center;
      z-index: 10;
    }

    .message {
      margin-top: 80px;
      font-size: 24px;
      color: white;
      font-weight: bold;
      text-shadow: 1px 1px 8px rgba(0,0,0,0.2);
    }

    @keyframes beat {
      0%, 100% {
        transform: rotate(-45deg) scale(1);
      }
      50% {
        transform: rotate(-45deg) scale(1.08);
      }
    }

    .floating-hearts {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
      top: 0;
      left: 0;
      z-index: -1;
    }

    .floating-hearts span {
      position: absolute;
      color: rgba(255,255,255,0.8);
      font-size: 24px;
      animation: floatUp 8s linear infinite;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(100vh) scale(0.8);
        opacity: 0;
      }
      20% {
        opacity: 1;
      }
      100% {
        transform: translateY(-10vh) scale(1.3);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

  <div class="floating-hearts">
    <span style="left:10%; animation-delay:0s;">❤️</span>
    <span style="left:25%; animation-delay:2s;">💖</span>
    <span style="left:40%; animation-delay:4s;">💕</span>
    <span style="left:60%; animation-delay:1s;">❤️</span>
    <span style="left:75%; animation-delay:3s;">💘</span>
    <span style="left:90%; animation-delay:5s;">💗</span>
  </div>

  <div class="container">
    <div class="heart">
      <div class="name">masa</div>
    </div>
    <div class="message">love u for ever❤️</div>
  </div>

</body>
</html>
