<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Our Journey | A ♥ M</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200;400&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f5f0ed; --text: #4a403a; --accent: #b8a69d; }
        body { background: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }

        /* نافيغاشن بار فخم */
        nav { display: flex; gap: 40px; margin-top: 50px; font-size: 0.9rem; letter-spacing: 2px; color: #8a7e78; }
        
        /* القسم الرئيسي - توزيع أسطوري */
        #hero { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; width: 100%; transition: 1s ease; }
        .heart-icon { font-size: 6rem; color: #d1c4bd; margin-bottom: 30px; }
        
        .main-grid { display: flex; gap: 100px; align-items: center; margin: 40px 0; }
        
        /* العداد الفخم */
        .counter-wrapper { text-align: center; }
        .counter-box { background: #4a403a; color: #f5f0ed; padding: 25px 40px; border-radius: 20px; font-size: 2rem; letter-spacing: 10px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }

        /* الاسم والرسالة */
        .name-wrapper { text-align: center; font-family: 'Playfair Display', serif; }
        .name-wrapper h1 { font-size: 4rem; margin: 0; }

        /* زر الدخول */
        .btn-start { background: transparent; border: 1px solid var(--text); padding: 15px 50px; border-radius: 50px; cursor: pointer; font-size: 1.1rem; letter-spacing: 3px; transition: 0.5s; }
        .btn-start:hover { background: var(--text); color: white; }

        /* القصة - ستايل احترافي */
        #story { display: none; width: 90%; max-width: 600px; padding: 100px 0; animation: fadeUp 1s ease; }
        .memory { border-right: 2px solid #d1c4bd; padding-right: 30px; margin-bottom: 60px; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; } }
    </style>
</head>
<body>

<nav>
    <div>Our Story</div><div>Gallery</div><div>Messages</div><div>Timeline</div><div>A ♥ M</div>
</nav>

<div id="hero">
    <div class="heart-icon">♡</div>
    <div class="main-grid">
        <div class="counter-wrapper">
            <p>Time Since We Met</p>
            <div class="counter-box">13 / 10 / 2025</div>
            <p>the best in my life and forever</p>
        </div>
        <div class="name-wrapper">
            <h1>masa</h1>
            <p>lovvvvvvvveee u forever ♥ habibtiii</p>
        </div>
    </div>
    <button class="btn-start" onclick="showStory()">Start Our Adventure</button>
</div>

<div id="story">
    <div class="memory">
        <h3>13/10/2025 - بداية الحكاية</h3>
        <p>هنا التقت أرواحنا، وبدأت أجمل رحلة في حياتي.</p>
    </div>
    <div class="memory">
        <h3>30/11/2025 - لقاء الروح</h3>
        <p>ست سنوات من الانتظار تلاشت في لحظة رؤيتك.</p>
    </div>
</div>

<script>
    function showStory() {
        document.getElementById('hero').style.display = 'none';
        document.getElementById('story').style.display = 'block';
    }
</script>
</body>
</html>
