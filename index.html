<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For My Love ❤️</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #fff0f5, #ffd6e8, #ffeef5);
      background-size: 400% 400%;
      animation: bgMove 10s ease infinite;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
      overflow: hidden;
      direction: rtl;
    }

    @keyframes bgMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      text-align: center;
      position: relative;
      z-index: 2;
    }

    .heart {
      position: relative;
      width: 250px;
      height: 250px;
      background: linear-gradient(135deg, #ff1e56, #ff4b7d);
      transform: rotate(-45deg);
      margin: 0 auto;
      animation: beat 1.2s infinite;
      box-shadow: 0 0 50px rgba(255, 0, 80, 0.4);
      border-radius: 20px;
    }

    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      width: 250px;
      height: 250px;
      background: linear-gradient(135deg, #ff1e56, #ff4b7d);
      border-radius: 50%;
    }

    .heart::before {
      top: -125px;
      left: 0;
    }

    .heart::after {
      left: 125px;
      top: 0;
    }

    .name {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(45deg);
      color: white;
      font-size: 34px;
      font-weight: bold;
      text-shadow: 0 0 10px rgba(255,255,255,0.8),
                   0 0 20px rgba(255,255,255,0.5);
      width: 220px;
      text-align: center;
      z-index: 10;
      animation: glowText 2s infinite alternate;
    }

    @keyframes glowText {
      from {
        text-shadow: 0 0 8px rgba(255,255,255,0.6);
      }
      to {
        text-shadow: 0 0 18px rgba(255,255,255,1),
                     0 0 28px rgba(255,255,255,0.8);
      }
    }

    .message {
      margin-top: 90px;
      font-size: 28px;
      color: white;
      font-weight: bold;
      text-shadow: 0 0 10px rgba(255,255,255,0.5);
      animation: fadeIn 2s ease;
    }

    .date {
      margin-top: 15px;
      font-size: 18px;
      color: white;
      opacity: 0.95;
      text-shadow: 0 0 8px rgba(255,255,255,0.4);
    }

    .love-btn {
      margin-top: 25px;
      padding: 14px 28px;
      border: none;
      border-radius: 30px;
      background: #ff2d55;
      color: white;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(255, 45, 85, 0.4);
      transition: 0.3s;
    }

    .love-btn:hover {
      transform: scale(1.08);
      box-shadow: 0 0 30px rgba(255, 45, 85, 0.7);
    }

    #secretMessage, #delayedMessage {
      margin-top: 20px;
      font-size: 24px;
      color: white;
      font-weight: bold;
      text-shadow: 0 0 10px rgba(255,255,255,0.6);
      min-height: 30px;
    }

    @keyframes beat {
      0%, 100% {
        transform: rotate(-45deg) scale(1);
      }
      50% {
        transform: rotate(-45deg) scale(1.08);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(15px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .floating-hearts {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
      top: 0;
      left: 0;
      z-index: 1;
    }

    .floating-hearts span {
      position: absolute;
      color: rgba(255,255,255,0.8);
      font-size: 26px;
      animation: floatUp 8s linear infinite;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(100vh) scale(0.8);
        opacity: 0;
      }
      20% {
        opacity: 1;
      }
      100% {
        transform: translateY(-10vh) scale(1.3);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

  <div class="floating-hearts">
    <span style="left:10%; animation-delay:0s;">❤️</span>
    <span style="left:25%; animation-delay:2s;">💖</span>
    <span style="left:40%; animation-delay:4s;">💕</span>
    <span style="left:60%; animation-delay:1s;">❤️</span>
    <span style="left:75%; animation-delay:3s;">💘</span>
    <span style="left:90%; animation-delay:5s;">💗</span>
  </div>

  <div class="container">
    <div class="heart">
      <div class="name">masa</div>
    </div>

    <div class="message">love u forever habibtii ❤️</div>
    <p class="date">Since 2025/10/13 tne best in my life and for ever ❤️</p>

    <button class="love-btn" onclick="showLove()">press here habibtii ❤️</button>

    <p id="secretMessage"></p>
    <p id="delayedMessage"></p>
  </div>

  <script>
    function showLove() {
      document.getElementById("secretMessage").innerHTML =
        "u are my love and my wife and the most greatest thing in my life loveee uuuuuuu for ever masa b7bkkkkkk wa bmoooot fekeeee ❤️";
    }

    setTimeout(() => {
      document.getElementById("delayedMessage").innerHTML =
        "in arabic: بحبببببببككككك و بموووووت فيكييييي يا حبيبتي و نور عيوني و روح قلبي و اميرة قلبي و زينة حياتي  ❤️";
    }, 4000);
  </script>

</body>
</html>
